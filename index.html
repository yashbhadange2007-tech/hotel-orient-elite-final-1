<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Hotel Orient Elite, Solapur - a cinematic luxury hospitality experience."
    />
    <link rel="icon" href="/favicon.ico?v=oe2" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=oe2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=oe2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=oe2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=oe2" />
    <link rel="manifest" href="/site.webmanifest?v=oe2" />
    <meta name="theme-color" content="#050403" />
    <style>
      #root:empty {
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: #050403;
        color: #fffaf0;
      }

      #root:empty::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 50% 38%, rgba(216, 183, 88, 0.2), transparent 24rem);
      }

      #root:empty::after {
        content: "WELCOME TO\A HOTEL ORIENT ELITE";
        position: relative;
        z-index: 1;
        white-space: pre;
        text-align: center;
        color: #fffaf0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.25rem, 8vw, 3rem);
        font-weight: 700;
        line-height: 1.08;
        letter-spacing: 0;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Hotel Orient Elite | Cinematic Hospitality in Solapur</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
